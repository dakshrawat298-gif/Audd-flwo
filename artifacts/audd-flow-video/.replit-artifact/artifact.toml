kind = "video"
previewPath = "/audd-flow-video/"
title = "Audd Flow — Showcase"
version = "1.0.0"
id = "artifacts/audd-flow-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/audd-flow-video/" ]
localPort = 20701

[services.development]
run = "pnpm --filter @workspace/audd-flow-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/audd-flow-video", "run", "build" ]
publicDir = "artifacts/audd-flow-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20701"
BASE_PATH = "/audd-flow-video/"
