kind = "web"
previewPath = "/"
title = "Audd Flow"
version = "1.0.0"
id = "artifacts/audd-flow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18930

[services.development]
run = "pnpm --filter @workspace/audd-flow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/audd-flow", "run", "build" ]
publicDir = "artifacts/audd-flow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18930"
BASE_PATH = "/"
